name: Build stub module

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MIPS toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mips-linux-gnu build-essential bc bison flex libssl-dev libelf-dev
          mips-linux-gnu-gcc --version
          echo "--- Denenecek alternatif: kernel'in kendi compiler uyumluluk fix'i ---"

      - name: Download and extract GPL archive
        run: |
          curl -sL -o GPL_W9970V3.tar.gz "https://static.tp-link.com/resources/gpl/GPL_W9970V3.tar.gz"
          ls -la GPL_W9970V3.tar.gz
          mkdir -p extracted
          tar -xzf GPL_W9970V3.tar.gz -C extracted || tar -xf GPL_W9970V3.tar.gz -C extracted
          rm -f GPL_W9970V3.tar.gz
          echo "Extraction tamamlandi, ust seviye:"
          ls extracted/

      - name: Locate kernel config and Module.symvers
        run: |
          set +e
          echo "=== .config dosyalari ==="
          find extracted -iname ".config" -path "*963381*" 2>/dev/null
          find extracted -iname ".config" 2>/dev/null | head -10
          echo "=== Module.symvers dosyalari ==="
          find extracted -iname "Module.symvers" 2>/dev/null
          echo "=== Kernel Makefile konumu ==="
          find extracted -maxdepth 3 -path "*kernel/linux-3.4rt*" -iname "Makefile" 2>/dev/null
          exit 0

      - name: Write stub source
        run: |
          mkdir -p stub_module
          cat > stub_module/wlan_feature_stub.c << 'EOF'
          #include <linux/module.h>
          #include <linux/kernel.h>

          MODULE_LICENSE("GPL");
          MODULE_DESCRIPTION("Stub for kerSysGetWlanFeature");

          unsigned int kerSysGetWlanFeature(void)
          {
              return 0;
          }
          EXPORT_SYMBOL(kerSysGetWlanFeature);

          static int __init stub_init(void)
          {
              printk(KERN_INFO "kerSysGetWlanFeature stub module loaded\n");
              return 0;
          }

          static void __exit stub_exit(void)
          {
              printk(KERN_INFO "kerSysGetWlanFeature stub module unloaded\n");
          }

          module_init(stub_init);
          module_exit(stub_exit);
          EOF
          cat > stub_module/Makefile << 'EOF'
          obj-m += wlan_feature_stub.o
          EOF
          echo "Stub kaynak dosyalari hazir:"
          ls -la stub_module/

      - name: Attempt kernel module build
        run: |
          set +e
          KDIR="extracted/GPL_W9970V3/4.16L.03/kernel/linux-3.4rt"
          echo "Kernel dizini: $KDIR"

          # GCC version uyumluluk workaround: yeni GCC (12+) icin
          # compiler-gccX.h dosyasi yok, en yuksek mevcut olanina sembolik link
          echo "--- Mevcut compiler-gcc*.h dosyalari ---"
          ls "$KDIR/include/linux/" | grep compiler-gcc
          HIGHEST=$(ls "$KDIR/include/linux/" | grep -oP 'compiler-gcc\K[0-9]+' | sort -n | tail -1)
          echo "En yuksek mevcut versiyon: gcc$HIGHEST"
          GCCVER=$(mips-linux-gnu-gcc -dumpversion | cut -d. -f1)
          echo "Kullanilan gcc versiyonu: $GCCVER"
          if [ ! -f "$KDIR/include/linux/compiler-gcc${GCCVER}.h" ]; then
            cp "$KDIR/include/linux/compiler-gcc${HIGHEST}.h" "$KDIR/include/linux/compiler-gcc${GCCVER}.h"
            echo "compiler-gcc${GCCVER}.h olusturuldu (compiler-gcc${HIGHEST}.h kopyasi)"
          fi

          ls "$KDIR/Makefile" 2>/dev/null || echo "Makefile YOK"
          if [ -z "$KDIR" ]; then
            echo "KERNEL DIZINI BULUNAMADI - build atlaniyor"
            exit 0
          fi
          cd stub_module
          make ARCH=mips CROSS_COMPILE=mips-linux-gnu- -C "$GITHUB_WORKSPACE/$KDIR" M="$PWD" modules 2>&1 | tee build_log.txt
          echo "=== Build sonucu ==="
          ls -la *.ko 2>/dev/null || echo "KO DOSYASI OLUSMADI"
          exit 0

      - name: Push results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add stub_module/ 2>/dev/null || true
          git commit -m "Stub module build denemesi" || echo "Degisiklik yok"
          git push
