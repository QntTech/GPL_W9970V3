name: Fetch GPL Source

on:
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download GPL archive (skip if already extracted)
        run: |
          if [ ! -d extracted ]; then
            curl -sL -o GPL_W9970V3.tar.gz "https://static.tp-link.com/resources/gpl/GPL_W9970V3.tar.gz"
            mkdir -p extracted
            tar -xzf GPL_W9970V3.tar.gz -C extracted || tar -xf GPL_W9970V3.tar.gz -C extracted
            rm -f GPL_W9970V3.tar.gz
          else
            echo "extracted/ zaten var, tekrar indirilmiyor"
          fi

      - name: Search for emfc, igsc, and all .ko dependency modules
        run: |
          echo "=== emfc ile ilgili dosyalar ===" > dep_search_results.txt
          find extracted -iname "*emfc*" 2>/dev/null >> dep_search_results.txt
          echo "" >> dep_search_results.txt
          echo "=== igsc ile ilgili dosyalar ===" >> dep_search_results.txt
          find extracted -iname "*igsc*" 2>/dev/null >> dep_search_results.txt
          echo "" >> dep_search_results.txt
          echo "=== Tum .ko dosyalari (963381GW altinda) ===" >> dep_search_results.txt
          find extracted -path "*963381GW*" -iname "*.ko" 2>/dev/null >> dep_search_results.txt
          echo "" >> dep_search_results.txt
          echo "=== bcmdrivers altindaki tum .ko / modul klasorleri ===" >> dep_search_results.txt
          find extracted/GPL_W9970V3/4.16L.03/bcmdrivers -maxdepth 4 -type d 2>/dev/null >> dep_search_results.txt
          echo "" >> dep_search_results.txt
          echo "=== fs/lib/modules altindaki TUM .ko dosyalari (tam liste) ===" >> dep_search_results.txt
          find extracted -path "*fs/lib/modules*" -iname "*.ko" 2>/dev/null >> dep_search_results.txt
          cat dep_search_results.txt

      - name: Push results and ko files to repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add dep_search_results.txt
          git add -A -- 'extracted/**/fs/lib/modules/**/*.ko' 2>/dev/null || true
          git commit -m "emfc/igsc arama sonuclari + modul ko dosyalari" || echo "Degisiklik yok"
          git push
