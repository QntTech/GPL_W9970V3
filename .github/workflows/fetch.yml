name: Fetch GPL Source

on:
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download GPL archive (skip if already extracted)
        run: |
          if [ ! -d extracted ]; then
            curl -sL -o GPL_W9970V3.tar.gz "https://static.tp-link.com/resources/gpl/GPL_W9970V3.tar.gz"
            mkdir -p extracted
            tar -xzf GPL_W9970V3.tar.gz -C extracted || tar -xf GPL_W9970V3.tar.gz -C extracted
            rm -f GPL_W9970V3.tar.gz
          fi

      - name: Search for emfc/igsc/wmf modules
        run: |
          set +e
          echo "=== emf ile ilgili .c dosyalari ===" > emf_search.txt
          grep -rl "EXPORT_SYMBOL(emfc_init)" extracted 2>/dev/null >> emf_search.txt
          grep -rl "EXPORT_SYMBOL(igsc_init)" extracted 2>/dev/null >> emf_search.txt
          grep -rl "EXPORT_SYMBOL(wmf_ipv6_enabled)" extracted 2>/dev/null >> emf_search.txt
          echo "" >> emf_search.txt
          echo "=== tum emf/igmp/wmf .ko dosyalari ===" >> emf_search.txt
          find extracted -path "*963381GW*" -iname "*.ko" 2>/dev/null >> emf_search.txt
          echo "" >> emf_search.txt
          echo "=== bcmdrivers/opensource/net altinda emf/igmp klasorleri ===" >> emf_search.txt
          find extracted/GPL_W9970V3/4.16L.03/bcmdrivers -iname "*emf*" -o -iname "*igmp*" -o -iname "*wmf*" 2>/dev/null >> emf_search.txt
          echo "" >> emf_search.txt
          echo "=== TUM .ko dosyalari (butun projede) ===" >> emf_search.txt
          find extracted -iname "*.ko" 2>/dev/null | grep -v "fs.dir\|fakeroot" >> emf_search.txt
          cat emf_search.txt
          exit 0

      - name: Push results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add emf_search.txt
          git commit -m "emf/igsc/wmf modul arama sonuclari" || echo "Degisiklik yok"
          git push
