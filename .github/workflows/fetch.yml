name: Fetch GPL Source

on:
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download GPL archive (skip if already extracted)
        run: |
          if [ ! -d extracted ]; then
            curl -sL -o GPL_W9970V3.tar.gz "https://static.tp-link.com/resources/gpl/GPL_W9970V3.tar.gz"
            mkdir -p extracted
            tar -xzf GPL_W9970V3.tar.gz -C extracted || tar -xf GPL_W9970V3.tar.gz -C extracted
            rm -f GPL_W9970V3.tar.gz
          else
            echo "extracted/ zaten var, tekrar indirilmiyor"
          fi

      - name: Search for kerSysGetWlanFeature symbol
        run: |
          echo "=== kerSysGetWlanFeature tanimlandigi/kullanildigi yerler ===" > symbol_search.txt
          grep -rl "kerSysGetWlanFeature" extracted 2>/dev/null >> symbol_search.txt
          echo "" >> symbol_search.txt
          echo "=== EXPORT_SYMBOL(kerSysGetWlanFeature) iceren dosyalar ===" >> symbol_search.txt
          grep -rl "EXPORT_SYMBOL(kerSysGetWlanFeature)" extracted 2>/dev/null >> symbol_search.txt
          echo "" >> symbol_search.txt
          echo "=== Fonksiyon tanimi (context ile) ===" >> symbol_search.txt
          grep -rn -A3 -B3 "kerSysGetWlanFeature" extracted --include="*.c" 2>/dev/null | head -100 >> symbol_search.txt
          echo "" >> symbol_search.txt
          echo "=== Ayni klasordeki diger .ko/module dosyalari (bcmdrivers/opensource/char) ===" >> symbol_search.txt
          find extracted/GPL_W9970V3/4.16L.03/bcmdrivers/opensource -maxdepth 3 -type d 2>/dev/null >> symbol_search.txt
          cat symbol_search.txt

      - name: Push results to repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add symbol_search.txt
          git commit -m "kerSysGetWlanFeature sembol arama sonuclari" || echo "Degisiklik yok"
          git push
